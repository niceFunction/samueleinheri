<!-- HEADER -->

<header class="header-background">

    <div class="header-container">

        <!-- NAME -->
        <button class="header-profile" id="header-profile">

            <div class="header-name">
                Samuel Einheri
            </div>

        </button>

        <!-- ICON BUTTONS -->
        <div class="header-icon-bar">

            <!-- MAIL -->
            <button 
            class="header-icon-button" 
            id="header-mail-button">

                <img 
                class="header-icon-normal"
                src="./ICONS/mail_normal.svg">

                <img 
                class="header-icon-highlighted"
                src="./ICONS/mail_highlighted.svg">

            </button>

            <!-- LINKEDIN -->
            <button 
            class="header-icon-button" 
            id="header-linkedin-button">

                <img 
                class="header-icon-normal"
                src="./ICONS/linkedin_normal.svg">

                <img 
                class="header-icon-highlighted"
                src="./ICONS/linkedin_highlighted.svg">

            </button>

            <!-- RESUME -->
            <button 
            class="header-icon-button" 
            id="header-resume-button">

                <img 
                class="header-icon-normal"
                src="./ICONS/resume_normal.svg">

                <img 
                class="header-icon-highlighted"
                src="./ICONS/resume_highlighted.svg">

            </button>
        </div>

        <!-- TEXT NAVIGATION -->
        <div class="header-button-bar">

            <button 
            class="header-button" 
            id="header-portfolio-button">
            </button>

            <button 
            class="header-button" 
            id="header-prototypes-button">
            </button>

            <button 
            class="header-button" 
            id="header-about-button">
            </button>

        </div>
    </div>
</header>
