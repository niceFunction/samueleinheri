<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Welcome</title>


<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">


<style>


:root {


    /* NAME + POSITION */
    --name: "Samuel Einheri";
    --position: "Game Designer";

    /* NAME */
    --name-font-size: 24px;
    --name-font-weight: 700;

    /* POSITION */
    --position-font-size: 16px;
    --position-font-weight: 400;

    /* NAME CONTAINER */
    --container-width: 300px;
    --container-height: 60px;

    /* CENTRE BUTTON NAMES */
    --portfolio-button-name: "PORTFOLIO";
    --prototypes-button-name: "PROTOTYPES";
    --about-me-button-name: "ABOUT ME";

    /* CENTRE TEXT BUTTONS */
    --button-font-size: 16px;
    --button-font-weight: 700;
    --button-gap: 20px;

    /* SHARED SETTINGS */
    --font-family: "Open Sans", sans-serif;
    --font-color: #DFE6E9;
    --button-hover-color: #FFC20A;

    /* BOTTOM CONTAINER */
    --menu-container-width: 1520px;
    --menu-container-height: 80px;
    --menu-container-bottom-offset: 40px;
    --menu-container-padding: 40px;

    /* ICON BUTTON SETTINGS */
    --icon-button-size: 48px;
    --icon-button-gap: 20px;

    /* ICON FILE PATHS */
    --mail_normal: "./ICONS/mail_normal.svg";
    --mail_highlighted: "./ICONS/mail_highlighted.svg";

    --linkedin_normal: "./ICONS/linkedin_normal.svg";
    --linkedin_highlighted: "./ICONS/linkedin_highlighted.svg";

    --resume_normal: "./ICONS/resume_normal.svg";
    --resume_highlighted: "./ICONS/resume_highlighted.svg";



    /* ICON LINKS */
    /*
    --mail-link: "mailto:samuel.einheri@gmail.com";
    --linkedin-link: "https://www.linkedin.com/in/samueleinheri/";
    --resume-link: "./DOWNLOAD/SamuelEinheri_Resume.pdf";
    */
}






html,
body {
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
}

video {
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    pointer-events:none;
}

/* MAIN CONTAINER */
.menu-container {
    position:fixed;
    left:50%;
    bottom:var(--menu-container-bottom-offset);
    transform:translateX(-50%);
    width:var(--menu-container-width);
    height:var(--menu-container-height);
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding-left:var(--menu-container-padding);
    padding-right:var(--menu-container-padding);
    box-sizing:border-box;
}

/* LEFT NAME BUTTON */
.profile-button {
    width:var(--container-width);
    height:var(--container-height);
    background:transparent;
    border:none;
    padding:0;
    cursor:pointer;
}

.name-box {
    width:100%;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    align-items:center;
    font-family:var(--font-family);
    color:var(--font-color);
    text-align:center;
}

.name {
    font-size:var(--name-font-size);
    font-weight:var(--name-font-weight);
    transition:color .2s ease;
}

.name::before {
    content:var(--name);
}

.position {
    font-size:var(--position-font-size);
    font-weight:var(--position-font-weight);
    transition:color .2s ease;
}

.position::before {
    content:var(--position);
}

.profile-button:hover .name,
.profile-button:hover .position {
    color:var(--button-hover-color);
}

/* CENTRE TEXT MENU */
.button-bar {
    position:absolute;
    left:50%;
    transform:translateX(-50%);
    display:flex;
    align-items:center;
    gap:var(--button-gap);
    font-family:var(--font-family);
}

.button {
    background:transparent;
    border:none;
    padding:8px 16px;
    color:var(--font-color);
    font-family:inherit;
    font-size:var(--button-font-size);
    font-weight:var(--button-font-weight);
    cursor:pointer;
}

.button:hover {
    color:var(--button-hover-color);
}

/* RIGHT ICON MENU */
.icon-bar {
    display:flex;
    align-items:center;
    gap:var(--icon-button-gap);
}

.icon-button {
    width:var(--icon-button-size);
    height:var(--icon-button-size);
    border:none;
    padding:0;
    background:transparent;
    cursor:pointer;
    position:relative;
}

.icon-button img {
    position:absolute;
    left:0;
    top:0;
    width:100%;
    height:100%;
    object-fit:contain;
    transition:opacity .2s ease;
}

.icon-highlighted {
    opacity:0;
}

.icon-button:hover .icon-normal {
    opacity:0;
}

.icon-button:hover .icon-highlighted {
    opacity:1;
}

</style>
</head>
<body>

<video autoplay muted loop playsinline>
    <source src="./WELCOME/Reel_2025_30FPS.mp4" type="video/mp4">
</video>

<div class="menu-container">

    <!-- LEFT NAME + POSITION -->
    <button class="profile-button">

        <div class="name-box">
            <div class="name"></div>
            <div class="position"></div>
        </div>


    </button>

    <!-- CENTRE TEXT MENU -->
    <div class="button-bar">

        <button class="button" id="portfolio-button"></button>
        <button class="button" id="prototypes-button"></button>
        <button class="button" id="about-me-button"></button>

    </div>

    <!-- RIGHT ICON MENU -->
    <div class="icon-bar">

        <!-- MAIL -->
        <button class="icon-button" id="mail-button">

            <img 
            class="icon-normal" 
            src="./ICONS/mail_normal.svg">

            <img 
            class="icon-highlighted" 
            src="./ICONS/mail_highlighted.svg">

        </button>

        <!-- LINKEDIN -->
        <button class="icon-button" id="linkedin-button">

            <img 
            class="icon-normal" 
            src="./ICONS/linkedin_normal.svg">

            <img 
            class="icon-highlighted" 
            src="./ICONS/linkedin_highlighted.svg">

        </button>

        <!-- RESUME -->
        <button class="icon-button" id="resume-button">

            <img 
            class="icon-normal" 
            src="./ICONS/resume_normal.svg">

            <img 
            class="icon-highlighted" 
            src="./ICONS/resume_highlighted.svg">

        </button>
    </div>
</div>

<script src="./reference.js"></script>
<script>

const root = getComputedStyle(document.documentElement);

/* CENTRE MENU TEXT */
document.getElementById("portfolio-button").textContent =
root.getPropertyValue("--portfolio-button-name").replaceAll('"','');

document.getElementById("prototypes-button").textContent =
root.getPropertyValue("--prototypes-button-name").replaceAll('"','');

document.getElementById("about-me-button").textContent =
root.getPropertyValue("--about-me-button-name").replaceAll('"','');

/* ICON BUTTON LINKS */

// MAIL

document.getElementById("mail-button").onclick = function () {

    window.location.href = SITE_REFERENCES.mail;

};


// LINKEDIN

document.getElementById("linkedin-button").onclick = function () {

    window.open(
        SITE_REFERENCES.linkedin,
        "_blank"
    );

};


// RESUME

document.getElementById("resume-button").onclick = function () {

    window.open(
        SITE_REFERENCES.resume,
        "_blank"
    );

};

</script>
</body>
</html>
