<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;700&display=swap" rel="stylesheet">

<style>

/* TODO: Turn the container into a button instead*/
/* TODO: When hovering, increase the size of the buttons by 5% */
/* TODO: When hovering on name/position (after it has been turned to a button) increase the size by the same scaling amount */

:root {

    /* Text content */
    --name: "Samuel Einheri";
    --position: "Game Designer";


    /* Button text content */
    --portfolio-button-name: "PORTFOLIO";
    --prototypes-button-name: "PROTOTYPES";
    --resources-button-name: "RESOURCES";
    --about-me-button-name: "ABOUT ME";


    /* Shared text settings */
    --font-family: "Open Sans", sans-serif;
    --font-color: #DFE6E9;


    /* Name settings */
    --name-font-size: 24px;
    --name-font-weight: 700;


    /* Position settings */
    --position-font-size: 16px;
    --position-font-weight: 400;


    /* Name container */
    --container-width: 300px;
    --container-height: 60px;
    --container-left-offset: 200px;
    --container-bottom-offset: 100px;


    /* Button settings */
    --button-font-size: 16px;
    --button-font-weight: 700;
    --button-hover-color: #FFC20A;
    --button-gap: 20px;

}



/* Base */

html,
body {

    margin: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;

}



/* Background video */

video {

    position: fixed;

    inset: 0;

    width: 100%;
    height: 100%;

    object-fit: cover;

    pointer-events: none;

}



/* Name + position container */

.name-box {

    position: fixed;

    left: var(--container-left-offset);

    bottom: var(--container-bottom-offset);


    width: var(--container-width);

    height: var(--container-height);


    display: flex;

    flex-direction: column;

    justify-content: space-between;

    align-items: center;


    font-family: var(--font-family);

    color: var(--font-color);

    text-align: center;

}



/* Name */

.name {

    font-size: var(--name-font-size);

    font-weight: var(--name-font-weight);

}


.name::before {

    content: var(--name);

}



/* Position */

.position {

    font-size: var(--position-font-size);

    font-weight: var(--position-font-weight);

}


.position::before {

    content: var(--position);

}





/* Button row */

.button-bar {

    position: fixed;


    /* Center horizontally in browser */

    left: 50%;


    /* Align vertical center with name container */

    bottom: calc(
        var(--container-bottom-offset) +
        (var(--container-height) / 2)
    );


    transform: translate(-50%, 50%);


    display: flex;

    gap: var(--button-gap);


    font-family: var(--font-family);

}





/* Buttons */

.button {

    background: transparent;

    border: none;


    padding: 8px 16px;


    color: var(--font-color);


    font-family: inherit;

    font-size: var(--button-font-size);

    font-weight: var(--button-font-weight);


    cursor: pointer;

}



.button:hover {

    color: var(--button-hover-color);

}


</style>

</head>


<body>


<!-- Background -->

<video autoplay muted loop playsinline>

    <source src="Reel_2025.mp4" type="video/mp4">

</video>





<!-- Name / Position -->

<div class="name-box">

    <div class="name"></div>

    <div class="position"></div>

</div>





<!-- Buttons -->

<div class="button-bar">

    <button class="button" id="portfolio-button"></button>

    <button class="button" id="prototypes-button"></button>

    <button class="button" id="resources-button"></button>

    <button class="button" id="about-me-button"></button>

</div>





<script>

const root = getComputedStyle(document.documentElement);


document.getElementById("portfolio-button").textContent =
    root.getPropertyValue("--portfolio-button-name").replaceAll('"','');


document.getElementById("prototypes-button").textContent =
    root.getPropertyValue("--prototypes-button-name").replaceAll('"','');


document.getElementById("resources-button").textContent =
    root.getPropertyValue("--resources-button-name").replaceAll('"','');


document.getElementById("about-me-button").textContent =
    root.getPropertyValue("--about-me-button-name").replaceAll('"','');


</script>


</body>
</html>
